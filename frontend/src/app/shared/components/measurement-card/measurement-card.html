<article class="rounded-2xl p-5 shadow-sm transition" [ngClass]="warning ? 'bg-orange-50 ring-1 ring-orange-300' : 'bg-white'">
    <div class="flex items-start justify-between gap-4">
        <div>
            <span class="text-sm font-medium text-slate-500">
                {{title}}
            </span>

            <strong class="mt-2 block text-3xl font-bold text-slate-900">
                {{value ?? 'N/A'}}
                <span *ngIf="unit" class="text-lg font-semibold text-slate-500">{{unit}}</span>
            </strong>

            <p *ngIf="description" class="mt-2 text-sm text-slate-500">{{description}}</p>
        </div>

        <div *ngIf="warning" class="rounded-full bg-orange-100 px-3 py-1 text-xs font-semibold text-orange-700">
            Alerta
        </div>
    </div>

</article>
